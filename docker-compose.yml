services:
  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/tmp
      - HF_HOME=/tmp/.cache/huggingface
      - MPLCONFIGDIR=/tmp/.config/matplotlib
volumes:
  backend_uploads:
